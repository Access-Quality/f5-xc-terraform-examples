name: "AWS VPC Site Destroy"

on:
  push:
    branches:
      - aws-vpc-site
  workflow_dispatch:
    inputs:
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE:
        description: "TF Cloud Workspace (optional)"
        required: false
        type: string
  workflow_call:
    inputs:
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE:
        description: "TF Cloud Workspace"
        required: false
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      TF_CLOUD_ORGANIZATION:
        required: true
      XC_API_P12_FILE:
        required: true
      XC_P12_PASSWORD :
          required: true
      XC_API_URL:
        required: true
      AWS_ACCESS_KEY:
        required: true
      AWS_SECRET_KEY:
        required: true
      AWS_SESSION_TOKEN:
          required: true
      XC_AWS_CLOUD_CREDENTIALS_NAME:
        required: false
      
jobs:
  aws_vpc_site:
    name: "AWS VPC Site Destroy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./f5/xc/aws-vpc-site"
    env:
      VOLT_API_URL: ${{ secrets.XC_API_URL }}
      VOLT_API_P12_FILE: "./api.p12"
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_aws_cloud_credentials_name: ${{ secrets.XC_AWS_CLOUD_CREDENTIALS_NAME }}
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE: "aws-vpc-site"
      TF_VAR_aws_region: "us-east-1"
      TF_VAR_name: "aws-vpc-site"
      TF_VAR_prefix: ""
      TF_VAR_site_type: "ingress_gw"
      TF_VAR_master_nodes_az_names: "[\"us-east-1a\"]"
      TF_VAR_vpc_cidr: "10.10.0.0/16"
      TF_VAR_local_subnets: "[\"10.10.1.0/24\"]"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
          
      - id: apply_variables 
        uses: ./.github/actions/apply-variables
        with: 
          vars_json: "${{ toJSON(vars) }}" 
          vars_prefix: "AWSVS_TF_VAR_"
          inputs_json: "${{ toJSON(inputs) }}" 

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          echo "${{secrets.XC_API_P12_FILE}}" | base64 -d > api.p12
          echo VOLT_API_P12_FILE="$PWD/api.p12" >> "$GITHUB_ENV"

          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "$TF_CLOUD_WORKSPACE_AWS_VPC_SITE"
              }
            }
          }
          EOF
          
      - name: Terraform Init
        id: init
        run: terraform init

      - name: Normalize AWS VPC Site module
        run: |
          perl -0pi -e 's/performance_enhancement_mode \{\n\s*perf_mode_l7_enhanced = \(null == var\.jumbo\)\n\n\s*dynamic "perf_mode_l3_enhanced" \{\n\s*for_each = \(null != var\.jumbo\) \? \[0\] : \[\]\n\s*content \{\n\s*jumbo\s*= \(true == var\.jumbo\) \? true : null\n\s*no_jumbo = \(false == var\.jumbo\) \? true : null\n\s*\}\n\s*\}\n\s*\}/dynamic "performance_enhancement_mode" {\n        for_each = \(null != var.jumbo\) ? [0] : []\n        content {\n          dynamic "perf_mode_l3_enhanced" {\n            for_each = [0]\n            content {\n              jumbo    = (true == var.jumbo) ? true : null\n              no_jumbo = (false == var.jumbo) ? true : null\n            }\n          }\n        }\n      }/g' .terraform/modules/aws_vpc_site/main.tf

      - name: Terraform Destroy
        id: destroy
        run: terraform destroy -auto-approve -input=false
