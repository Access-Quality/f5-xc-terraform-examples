name: "WAF en RE para VM en AWS - Destroy"

# IMPORTANT: The three Terraform Cloud workspaces used by this workflow
# (INFRA, VM, XC) must be configured with execution mode "Local" so that
# Terraform runs on the GitHub Actions runner and reads variables from the
# environment instead of from TFC variable sets.

on:
  workflow_dispatch:

jobs:

  terraform_xc:
    name: "F5XC WAF"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./aws/waf-re-aws/xc
    env:
      TF_VAR_tf_cloud_organization:    ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_tf_cloud_workspace_infra: ${{ vars.TF_CLOUD_WORKSPACE_AWS_INFRA }}
      TF_VAR_tf_cloud_workspace_vm:    ${{ vars.TF_CLOUD_WORKSPACE_AWS_VM }}
      TF_VAR_api_url:                  ${{ secrets.XC_API_URL }}
      TF_VAR_xc_namespace:             ${{ vars.XC_NAMESPACE }}
      TF_VAR_app_domain:               ${{ vars.ARCADIA_DOMAIN }}
      TF_VAR_xc_waf_blocking:          ${{ vars.XC_WAF_BLOCKING }}
      VES_P12_PASSWORD:                ${{ secrets.XC_P12_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_AWS_XC }}"
              }
            }
          }
          EOF
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > api.p12

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

      - name: Delete XC Namespace
        run: |
          XC_API_BASE=$(echo "${{ secrets.XC_API_URL }}" | sed 's|/api$||')
          openssl pkcs12 -legacy -in api.p12 -passin pass:"${{ secrets.XC_P12_PASSWORD }}" -nokeys -clcerts -out /tmp/client.crt 2>/dev/null
          openssl pkcs12 -legacy -in api.p12 -passin pass:"${{ secrets.XC_P12_PASSWORD }}" -nocerts -nodes -out /tmp/client.key 2>/dev/null
          if [ ! -s /tmp/client.crt ] || [ ! -s /tmp/client.key ]; then
            echo "ERROR: Failed to extract cert/key from P12"
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /tmp/ns_del_response.json -w "%{http_code}" \
            --cert /tmp/client.crt \
            --key /tmp/client.key \
            -X DELETE \
            "${XC_API_BASE}/api/web/namespaces/${{ vars.XC_NAMESPACE }}")
          rm -f /tmp/client.crt /tmp/client.key
          echo "Response code: ${HTTP_CODE}"
          cat /tmp/ns_del_response.json
          if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "404" ]; then
            echo "ERROR: Failed to delete namespace (HTTP ${HTTP_CODE})"
            exit 1
          fi
          echo "Namespace deleted (200=deleted, 404=already gone)"

  terraform_vm:
    name: "AWS VM (Arcadia)"
    runs-on: ubuntu-latest
    needs: terraform_xc
    defaults:
      run:
        working-directory: ./aws/waf-re-aws/vm
    env:
      AWS_ACCESS_KEY_ID:               ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY:           ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization:    ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_tf_cloud_workspace_infra: ${{ vars.TF_CLOUD_WORKSPACE_AWS_INFRA }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Extract SSH public key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          SSH_PUBLIC_KEY=$(ssh-keygen -y -f /tmp/id_rsa)
          rm -f /tmp/id_rsa
          echo "TF_VAR_ssh_key=${SSH_PUBLIC_KEY}" >> $GITHUB_ENV

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_AWS_VM }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

  terraform_infra:
    name: "AWS Infra"
    runs-on: ubuntu-latest
    needs: terraform_vm
    defaults:
      run:
        working-directory: ./aws/waf-re-aws/infra
    env:
      AWS_ACCESS_KEY_ID:            ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY:        ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_aws_region:            ${{ vars.AWS_REGION }}
      TF_VAR_project_prefix:        ${{ vars.PROJECT_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_AWS_INFRA }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
