name: "Seguridad API en RE para EKS con CE"

# Secrets (Settings > Secrets and variables > Actions > Secrets):
#   TF_API_TOKEN            - Terraform Cloud user token
#   TF_CLOUD_ORGANIZATION   - Terraform Cloud organization name
#   AWS_ACCESS_KEY          - AWS Access Key ID
#   AWS_SECRET_KEY          - AWS Secret Access Key
#   SSH_PRIVATE_KEY         - SSH private key (RSA) for EC2/EKS node access
#   XC_API_P12_FILE         - F5 XC API certificate (.p12) encoded in base64
#   XC_API_URL              - F5 XC tenant API URL
#   XC_P12_PASSWORD         - Password for the .p12 certificate
#   XC_TENANT               - F5 XC tenant name
#   XC_CE_TOKEN             - F5 XC CE pre-registration token (opcional: si no se configura, el workflow lo crea automáticamente)
#   OPENAI_API_KEY          - OpenAI API key for the crAPI chatbot (optional)
#
# Variables (Settings > Secrets and variables > Actions > Variables):
#   PROJECT_PREFIX              - Prefix for resource names
#   AWS_REGION                  - AWS region (e.g. us-east-1)
#   TF_CLOUD_WORKSPACE_INFRA    - TF Cloud workspace for AWS base infra
#   TF_CLOUD_WORKSPACE_EKS      - TF Cloud workspace for EKS cluster
#   TF_CLOUD_WORKSPACE_CRAPI    - TF Cloud workspace for crAPI app
#   TF_CLOUD_WORKSPACE_CE       - TF Cloud workspace for F5 XC CE deployment
#   TF_CLOUD_WORKSPACE_XC       - TF Cloud workspace for F5 XC API Security
#   CE_LATITUDE                 - Latitude for CE site registration
#   CE_LONGITUDE                - Longitude for CE site registration
#   AZS                         - AWS Availability Zones as JSON list (e.g. ["us-east-1a","us-east-1b"])
#   XC_NAMESPACE                - F5 XC namespace for app objects
#   CRAPI_DOMAIN                - FQDN for the app (e.g. app.prod.example.com)

on:
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # Job 0: Setup Terraform Cloud Workspaces + Remote State Sharing
  # -------------------------------------------------------
  setup_tfc_workspaces:
    name: "Setup TFC Workspaces"
    runs-on: ubuntu-latest
    env:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
      TF_ORG: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      WS_INFRA: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      WS_EKS: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}
      WS_CRAPI: ${{ vars.TF_CLOUD_WORKSPACE_CRAPI }}
      WS_CE: ${{ vars.TF_CLOUD_WORKSPACE_CE }}
      WS_XC: ${{ vars.TF_CLOUD_WORKSPACE_XC }}
    steps:
      - name: Create workspaces and configure Remote State Sharing
        run: |
          TFC_API="https://app.terraform.io/api/v2"
          AUTH="Authorization: Bearer ${TF_API_TOKEN}"
          CT="Content-Type: application/vnd.api+json"

          create_or_update_workspace() {
            local ws_name=$1
            existing=$(curl -sf \
              --header "${AUTH}" \
              "${TFC_API}/organizations/${TF_ORG}/workspaces/${ws_name}" || true)
            if [ -n "${existing}" ]; then
              echo "Workspace '${ws_name}' already exists — ensuring execution-mode=local" >&2
              ws_id=$(echo "${existing}" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
              curl -sf \
                --header "${AUTH}" --header "${CT}" \
                --request PATCH \
                --data "{\"data\":{\"type\":\"workspaces\",\"attributes\":{\"execution-mode\":\"local\"}}}" \
                "${TFC_API}/workspaces/${ws_id}" > /dev/null
            else
              echo "Creating workspace '${ws_name}'" >&2
              response=$(curl -sf \
                --header "${AUTH}" --header "${CT}" \
                --request POST \
                --data "{\"data\":{\"type\":\"workspaces\",\"attributes\":{\"name\":\"${ws_name}\",\"execution-mode\":\"local\",\"global-remote-state\":false}}}" \
                "${TFC_API}/organizations/${TF_ORG}/workspaces")
              ws_id=$(echo "${response}" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
            fi
            echo "${ws_id}"
          }

          add_remote_state_consumer() {
            local producer_id=$1
            local consumer_id=$2
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              --header "${AUTH}" --header "${CT}" \
              --request POST \
              --data "{\"data\":[{\"id\":\"${consumer_id}\",\"type\":\"workspaces\"}]}" \
              "${TFC_API}/workspaces/${producer_id}/relationships/remote-state-consumers")
            if [ "${http_code}" = "204" ] || [ "${http_code}" = "422" ]; then
              echo "  remote-state-consumer ok (${http_code})"
            else
              echo "  ERROR adding remote-state-consumer: HTTP ${http_code}" && exit 1
            fi
          }

          echo "=== Creating / updating workspaces ==="
          ID_INFRA=$(create_or_update_workspace "${WS_INFRA}")
          echo "  INFRA  -> ${ID_INFRA}"
          ID_EKS=$(create_or_update_workspace "${WS_EKS}")
          echo "  EKS    -> ${ID_EKS}"
          ID_CRAPI=$(create_or_update_workspace "${WS_CRAPI}")
          echo "  CRAPI  -> ${ID_CRAPI}"
          ID_CE=$(create_or_update_workspace "${WS_CE}")
          echo "  CE     -> ${ID_CE}"
          ID_XC=$(create_or_update_workspace "${WS_XC}")
          echo "  XC     -> ${ID_XC}"

          echo "=== Configuring Remote State Sharing ==="
          echo "INFRA -> EKS:";   add_remote_state_consumer "${ID_INFRA}" "${ID_EKS}"
          echo "INFRA -> CRAPI:"; add_remote_state_consumer "${ID_INFRA}" "${ID_CRAPI}"
          echo "INFRA -> CE:";    add_remote_state_consumer "${ID_INFRA}" "${ID_CE}"
          echo "INFRA -> XC:";    add_remote_state_consumer "${ID_INFRA}" "${ID_XC}"
          echo "EKS -> CRAPI:";   add_remote_state_consumer "${ID_EKS}" "${ID_CRAPI}"
          echo "EKS -> CE:";      add_remote_state_consumer "${ID_EKS}" "${ID_CE}"
          echo "EKS -> XC:";      add_remote_state_consumer "${ID_EKS}" "${ID_XC}"

  # -------------------------------------------------------
  # Job 1: AWS Base Infrastructure
  # -------------------------------------------------------
  terraform_infra:
    name: "AWS Infra"
    runs-on: ubuntu-latest
    needs: setup_tfc_workspaces
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/infra
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_azs: ${{ vars.AZS }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_nap: "false"
      TF_VAR_nic: "false"
      TF_VAR_bigip: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive SSH Public Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          SSH_PUB_KEY=$(ssh-keygen -y -f /tmp/ssh_key)
          rm -f /tmp/ssh_key
          echo "TF_VAR_ssh_key=$SSH_PUB_KEY" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_INFRA }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  # -------------------------------------------------------
  # Job 2: Amazon EKS Cluster
  # -------------------------------------------------------
  terraform_eks:
    name: "AWS EKS"
    runs-on: ubuntu-latest
    needs: terraform_infra
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/eks-cluster
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive SSH Public Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          SSH_PUB_KEY=$(ssh-keygen -y -f /tmp/ssh_key)
          rm -f /tmp/ssh_key
          echo "TF_VAR_ssh_key=$SSH_PUB_KEY" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_EKS }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  # -------------------------------------------------------
  # Job 3: crAPI Application (Helm)
  # -------------------------------------------------------
  terraform_crapi:
    name: "crAPI App"
    runs-on: ubuntu-latest
    needs: terraform_eks
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/crapi-helm
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_infra_workspace: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_eks_workspace: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}
      TF_VAR_chatbot_enabled: ${{ secrets.OPENAI_API_KEY != '' && 'true' || 'false' }}
      TF_VAR_chatbot_openai_key: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_CRAPI }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      - name: Configure kubectl
        run: |
          CLUSTER_NAME=$(aws eks list-clusters --region "${{ vars.AWS_REGION }}" \
            --query "clusters[?starts_with(@,'${{ vars.PROJECT_PREFIX }}')]|[0]" \
            --output text)
          aws eks update-kubeconfig --region "${{ vars.AWS_REGION }}" --name "$CLUSTER_NAME"

      - name: Wait for crAPI identity service to be ready
        run: |
          echo "Waiting for crapi-identity deployment to be ready..."
          kubectl rollout status deployment/crapi-identity -n crapi --timeout=180s

      - name: Create MCP server admin user in crAPI
        run: |
          # The chatbot MCP server needs this user to authenticate with crAPI on startup.
          # Without it, the MCP server process crashes silently and the chatbot returns
          # "unhandled errors in a TaskGroup" on every question.
          ELB=$(kubectl get svc crapi-web -n crapi \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          echo "crAPI ELB: $ELB"

          for i in $(seq 1 20); do
            # Use || true so curl DNS failures don't abort the script under bash -e
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 --max-time 10 \
              "http://$ELB/identity/health_check" 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "crAPI identity is reachable (HTTP $HTTP)"
              break
            fi
            echo "  Attempt $i/20 — HTTP ${HTTP} — waiting 15s..."
            sleep 15
          done

          RESPONSE=$(curl -s -X POST "http://$ELB/identity/api/auth/signup" \
            --connect-timeout 5 --max-time 15 \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@example.com","name":"MCP Admin","number":"5550000000","password":"Admin!123"}' \
            2>/dev/null || echo '{}')
          echo "Signup response: $RESPONSE"

          # 200 = created, 403 = already exists — both are acceptable
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ]; then
            echo "MCP admin user ready (status: $STATUS)"
          else
            echo "WARNING: unexpected signup response — $RESPONSE"
          fi

          # Restart chatbot to ensure MCP server picks up the user on a clean start
          kubectl rollout restart deployment/crapi-chatbot -n crapi
          kubectl rollout status deployment/crapi-chatbot -n crapi --timeout=120s
          echo "Chatbot restarted successfully"

  # -------------------------------------------------------
  # Job 4: F5 XC Customer Edge on EKS
  # -------------------------------------------------------
  terraform_ce:
    name: "F5XC CE on AWS EKS"
    runs-on: ubuntu-latest
    needs: terraform_crapi
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/eks-cluster/ce-deployment
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_aws_waf_ce: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_eks_workspace: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}
      # F5 XC credentials para crear el site token automáticamente
      XC_API_URL: ${{ secrets.XC_API_URL }}
      XC_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create F5 XC Site Token
        run: |
          # Si XC_CE_TOKEN está configurado como secret, úsalo directamente.
          # Si no, créalo automáticamente via la API REST de F5 XC con el P12.
          if [ -n "${{ secrets.XC_CE_TOKEN }}" ]; then
            echo "Using pre-configured XC_CE_TOKEN secret."
            echo "XC_CE_TOKEN=${{ secrets.XC_CE_TOKEN }}" >> $GITHUB_ENV
            exit 0
          fi

          echo "XC_CE_TOKEN not set — creating site token via F5 XC API..."
          TOKEN_NAME="${{ vars.PROJECT_PREFIX }}-ce-token"

          # Decodificar P12 y extraer cert + key en PEM
          # -legacy es necesario en OpenSSL 3.x (Ubuntu 22+) para leer P12 con
          # cifrado RC2-40-CBC que usa F5 XC.
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > /tmp/api.p12
          openssl pkcs12 -legacy -in /tmp/api.p12 -clcerts -nokeys \
            -passin pass:"${XC_P12_PASSWORD}" -out /tmp/cert.pem 2>/dev/null || \
          openssl pkcs12 -in /tmp/api.p12 -clcerts -nokeys \
            -passin pass:"${XC_P12_PASSWORD}" -out /tmp/cert.pem 2>/dev/null
          openssl pkcs12 -legacy -in /tmp/api.p12 -nocerts -nodes \
            -passin pass:"${XC_P12_PASSWORD}" -out /tmp/key.pem 2>/dev/null || \
          openssl pkcs12 -in /tmp/api.p12 -nocerts -nodes \
            -passin pass:"${XC_P12_PASSWORD}" -out /tmp/key.pem 2>/dev/null

          if [ ! -s /tmp/cert.pem ] || [ ! -s /tmp/key.pem ]; then
            echo "ERROR: No se pudo extraer cert/key del P12."
            exit 1
          fi

          # Intentar obtener token existente con ese nombre
          EXISTING=$(curl -s \
            --cert /tmp/cert.pem --key /tmp/key.pem \
            "${XC_API_URL}/register/namespaces/system/tokens/${TOKEN_NAME}" 2>/dev/null || echo "")

          # El token UUID está en system_metadata.uid (no en spec.token)
          TOKEN_VALUE=$(echo "$EXISTING" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['system_metadata']['uid'])" 2>/dev/null || echo "")

          # Si no existe, crearlo
          if [ -z "$TOKEN_VALUE" ]; then
            echo "Token '${TOKEN_NAME}' not found — creating..."
            RESPONSE=$(curl -s \
              --cert /tmp/cert.pem --key /tmp/key.pem \
              -X POST "${XC_API_URL}/register/namespaces/system/tokens" \
              -H "Content-Type: application/json" \
              -d "{\"metadata\":{\"name\":\"${TOKEN_NAME}\",\"namespace\":\"system\"},\"spec\":{}}" 2>/dev/null)
            TOKEN_VALUE=$(echo "$RESPONSE" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['system_metadata']['uid'])" 2>/dev/null || echo "")
          fi

          rm -f /tmp/api.p12 /tmp/cert.pem /tmp/key.pem

          if [ -z "$TOKEN_VALUE" ]; then
            echo "ERROR: No se pudo crear ni obtener el site token de F5 XC."
            echo "Verifica que XC_API_URL, XC_API_P12_FILE y XC_P12_PASSWORD sean correctos."
            exit 1
          fi

          echo "Site token '${TOKEN_NAME}' listo."
          echo "XC_CE_TOKEN=${TOKEN_VALUE}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_CE }}"
              }
            }
          }
          EOF

      - name: Setup Configmap
        id: configmap
        run: |
          cat > configmap.tf << EOF
          resource "kubectl_manifest" "configmap" {
              yaml_body = <<YAML
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: vpm-cfg
                namespace: ves-system
              data:
               config.yaml: |
                Vpm:
                  ClusterName: ${{ vars.PROJECT_PREFIX }}
                  ClusterType: ce
                  Config: /etc/vpm/config.yaml
                  DisableModules: ["recruiter"]
                  Latitude: ${{ vars.CE_LATITUDE }}
                  Longitude: ${{ vars.CE_LONGITUDE }}
                  MauriceEndpoint: https://register.ves.volterra.io
                  MauricePrivateEndpoint: https://register-tls.ves.volterra.io
                  PrivateNIC: eth0
                  SkipStages: ["osSetup", "etcd", "kubelet", "master", "voucher", "workload", "controlWorkload"]
                  Token: ${XC_CE_TOKEN}
                  CertifiedHardware: k8s-minikube-voltmesh
              YAML
          }
          EOF

      - name: Terraform fmt
        id: format
        run: |
          terraform fmt
          cat configmap.tf

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  # -------------------------------------------------------
  # Job 5: F5 XC API Security Configuration
  # -------------------------------------------------------
  terraform_xc:
    name: "F5XC API Security"
    runs-on: ubuntu-latest
    needs: terraform_ce
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/xc
    env:
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_api_url: ${{ secrets.XC_API_URL }}
      TF_VAR_xc_tenant: ${{ secrets.XC_TENANT }}
      TF_VAR_xc_namespace: ${{ vars.XC_NAMESPACE }}
      TF_VAR_app_domain: ${{ vars.CRAPI_DOMAIN }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_xc_p12_password: ${{ secrets.XC_P12_PASSWORD }}
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      # Infra and EKS workspace names (parametrized remote state reads)
      TF_VAR_aws: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_eks_workspace: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}
      # EKS CE site origin pool via k8s service
      TF_VAR_eks_ce_site: "true"
      TF_VAR_k8s_pool: "true"
      TF_VAR_serviceName: "crapi-web.crapi"
      TF_VAR_serviceport: "80"
      TF_VAR_site_name: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_user_site: "true"
      TF_VAR_http_only: "true"
      TF_VAR_xc_api_disc: "true"
      # AWS credentials needed to poll CE status via kubectl
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_XC }}"
              }
            }
          }
          EOF
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > api.p12

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Configure kubectl for CE status polling
        run: |
          CLUSTER_NAME=$(aws eks list-clusters --region "${{ vars.AWS_REGION }}" \
            --query "clusters[?starts_with(@,'${{ vars.PROJECT_PREFIX }}')]|[0]" \
            --output text)
          echo "EKS cluster: $CLUSTER_NAME"
          aws eks update-kubeconfig --region "${{ vars.AWS_REGION }}" --name "$CLUSTER_NAME"

      - name: Wait for vp-manager-0 to boot and send registration
        run: |
          echo "Polling until vp-manager-0 is Running in ves-system (max 10 min)..."
          for i in $(seq 1 20); do
            STATUS=$(kubectl get pod vp-manager-0 -n ves-system --no-headers 2>/dev/null | awk '{print $3}')
            READY=$(kubectl get pod vp-manager-0 -n ves-system --no-headers 2>/dev/null | awk '{print $2}')
            if [ "$STATUS" = "Running" ] && [ "$READY" = "1/1" ]; then
              echo "vp-manager-0 is Running — waiting 90s for registration request to reach F5 XC..."
              sleep 90
              break
            fi
            echo "  Attempt $i/20 — vp-manager-0: ${STATUS:-not found} ${READY:-0/0} — waiting 30s..."
            sleep 30
          done

      - name: Approve CE Registration (force replace)
        run: |
          # -replace forces Terraform to re-run the approval on every workflow execution,
          # preventing stale TF state from skipping the approval when the CE re-registers.
          terraform apply -auto-approve -input=false \
            -replace=volterra_registration_approval.k8s-ce[0] \
            -target=volterra_site_state.site[0] \
            -target=volterra_registration_approval.k8s-ce[0]

      - name: Wait for CE to be ONLINE (ver-0 fully Running)
        run: |
          echo "Polling until ver-0 is Running with all containers ready (max 20 min)..."
          STATUS=""
          CURRENT="0"
          TOTAL="1"
          for i in $(seq 1 40); do
            READY=$(kubectl get pod ver-0 -n ves-system --no-headers 2>/dev/null | awk '{print $2}')
            STATUS=$(kubectl get pod ver-0 -n ves-system --no-headers 2>/dev/null | awk '{print $3}')
            if [ "$STATUS" = "Running" ] && [ -n "$READY" ]; then
              CURRENT=$(echo "$READY" | cut -d'/' -f1)
              TOTAL=$(echo "$READY" | cut -d'/' -f2)
              if [ "$CURRENT" = "$TOTAL" ]; then
                echo "CE is ONLINE: ver-0 $READY — proceeding with full apply"
                break
              fi
            fi
            echo "  Attempt $i/40 — ver-0: ${STATUS:-not found} ${READY:-0/0} — waiting 30s..."
            sleep 30
          done
          if [ "$CURRENT" != "$TOTAL" ]; then
            echo "ERROR: CE ver-0 never reached Running state after 20 minutes."
            kubectl get pods -n ves-system
            kubectl describe pod vp-manager-0 -n ves-system 2>/dev/null | tail -20
            exit 1
          fi

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  # -------------------------------------------------------
  # Job 6: Show deployment endpoints
  # -------------------------------------------------------
  show_endpoints:
    name: "Show Deployment Endpoints"
    runs-on: ubuntu-latest
    needs: terraform_xc
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Configure kubectl
        run: |
          CLUSTER_NAME=$(aws eks list-clusters --region "$AWS_REGION" \
            --query "clusters[?starts_with(@,'${{ vars.PROJECT_PREFIX }}')]|[0]" \
            --output text)
          echo "EKS Cluster: $CLUSTER_NAME"
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"

      - name: Show endpoints
        run: |
          ELB1=$(kubectl get svc crapi-web -n crapi \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          ELB2=$(kubectl get svc mailhog-web-ingress -n crapi \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          CRAPI_DOMAIN="${{ vars.CRAPI_DOMAIN }}"
          APP_IP=$(host "$CRAPI_DOMAIN" 2>/dev/null | awk '/has address/ { print $4; exit }')

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              DEPLOYMENT ENDPOINTS SUMMARY                   ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║ CRAPI_DOMAIN  : $CRAPI_DOMAIN"
          echo "║ CRAPI_DOMAIN IP (DNS): $APP_IP"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║ ELB #1 — crapi-web (acceso directo :80/:443)"
          echo "║   $ELB1"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║ ELB #2 — mailhog-ingress (portal Mailhog :8025)"
          echo "║   $ELB2"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║ URLs de acceso:"
          echo "║   crAPI (via F5 XC RE) : http://$CRAPI_DOMAIN"
          echo "║   crAPI (directo)      : http://$ELB1"
          echo "║   Mailhog              : http://$ELB2:8025"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
