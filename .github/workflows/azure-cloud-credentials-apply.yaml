name: "Azure XC Cloud Credentials Apply"

on:
  push:
    branches:
      - azure-cloud-credentials
  workflow_dispatch:
    inputs:
      TF_VAR_name:
        description: "Deployment name (optional)"
        required: false
        type: string
      TF_VAR_prefix:
        description: "Prefix (optional)"
        required: false
        type: string
      TF_CLOUD_WORKSPACE_AZURE_CREDENTIALS:
        description: "TF Cloud Workspace (optional)"
        required: false
        type: string
  workflow_call:
    inputs:
      TF_VAR_name:
        description: "Deployment name"
        required: false
        type: string
      TF_VAR_prefix:
        description: "Prefix"
        required: false
        type: string
      TF_CLOUD_WORKSPACE_AZURE_CREDENTIALS:
        description: "TF Cloud Workspace"
        required: false
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      TF_CLOUD_ORGANIZATION:
        required: true
      XC_API_P12_FILE:
        required: true
      XC_P12_PASSWORD :
        required: true
      XC_API_URL:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: true
      XC_AZURE_SUBSCRIPTION_ID:
        required: false
      XC_AZURE_TENANT_ID:
        required: false
      XC_AZURE_CLIENT_ID:
        required: false
      XC_AZURE_CLIENT_SECRET:
        required: false
      XC_AZURE_CLOUD_CREDENTIALS_NAME:
        required: false
    outputs:
      azure_credentials_name:
        description: "Azure XC Cloud Credentials Name"
        value: ${{ jobs.azure_credentials.outputs.azure_credentials_name }}
      azure_credentials_namespace:
        description: "Azure XC Cloud Credentials Namespace"
        value: ${{ jobs.azure_credentials.outputs.azure_credentials_namespace }}
  
jobs:
  azure_credentials:
    name: "Azure Cloud Credentials"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./f5/xc/azure-cloud-credentials"
    env:
      TF_VAR_name: "azure-cloud-credentials"
      TF_VAR_prefix: ""
      TF_CLOUD_WORKSPACE_AZURE_CREDENTIALS: "azure-cloud-credentials"
      VOLT_API_URL: ${{ secrets.XC_API_URL }}
      VOLT_API_P12_FILE: "./api.p12"
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_xc_azure_client_id: ${{ secrets.XC_AZURE_CLIENT_ID }}
      TF_VAR_xc_azure_client_secret: ${{ secrets.XC_AZURE_CLIENT_SECRET }}
      TF_VAR_xc_azure_tenant_id: ${{ secrets.XC_AZURE_TENANT_ID }}
      TF_VAR_xc_azure_subscription_id: ${{ secrets.XC_AZURE_SUBSCRIPTION_ID }}
      TF_VAR_azure_cloud_credentials_name : ${{ secrets.XC_AZURE_CLOUD_CREDENTIALS_NAME }}
    outputs:
      azure_credentials_name: ${{ steps.output_vars.outputs.azure_credentials_name }}
      azure_credentials_namespace: ${{ steps.output_vars.outputs.azure_credentials_namespace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: f5devcentral/f5-xc-terraform-examples
          
      - id: apply_variables 
        uses: "f5devcentral/f5-xc-terraform-examples/.github/actions/apply-variables@main" 
        with: 
          vars_json: "${{ toJSON(vars) }}" 
          vars_prefix: "AZCC_TF_VAR_"
          inputs_json: "${{ toJSON(inputs) }}" 

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          echo "${{secrets.XC_API_P12_FILE}}" | base64 -d > api.p12
          echo VOLT_API_P12_FILE="$PWD/api.p12" >> "$GITHUB_ENV"

          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "$TF_CLOUD_WORKSPACE_AZURE_CREDENTIALS"
              }
            }
          }
          EOF
          
      - name: Terraform Init
        id: init
        run: terraform init
      
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Apply
        run: |
          set -o pipefail

          resource_address='module.azure_cloud_credentials[0].volterra_cloud_credentials.this'
          cloud_credentials_name="$TF_VAR_name"
          if [[ -n "$TF_VAR_prefix" ]]; then
            cloud_credentials_name="$TF_VAR_prefix-$TF_VAR_name"
          fi

          try_import_existing_credentials() {
            local candidate

            if terraform state show "$resource_address" >/dev/null 2>&1; then
              echo "Azure cloud credentials resource is already present in Terraform state"
              return 0
            fi

            for candidate in \
              "system/$cloud_credentials_name" \
              "$cloud_credentials_name"
            do
              [[ -n "$candidate" ]] || continue
              echo "Trying to import existing Azure cloud credentials with ID: $candidate"
              if terraform import -no-color -input=false "$resource_address" "$candidate"; then
                echo "Imported existing Azure cloud credentials into Terraform state"
                return 0
              fi
            done

            return 1
          }

          apply_log="$(mktemp)"
          if terraform apply -no-color -auto-approve -input=false 2>&1 | tee "$apply_log"; then
            rm -f "$apply_log"
            exit 0
          fi

          if grep -q 'Object already exists' "$apply_log"; then
            echo "Detected existing Azure cloud credentials without Terraform state. Attempting import..."
            if try_import_existing_credentials; then
              rm -f "$apply_log"
              echo "Import completed. Retrying terraform apply..."
              terraform apply -no-color -auto-approve -input=false
              exit $?
            fi
            echo "Automatic import failed for the existing Azure cloud credentials"
          fi

          rm -f "$apply_log"
          exit 1

      - name: Set output vars
        id: output_vars
        run: |
          sleep 5
          echo "azure_credentials_name=$(terraform-bin output -no-color -raw name)" >> "$GITHUB_OUTPUT"
          echo "azure_credentials_namespace=$(terraform-bin output -no-color -raw namespace)" >> "$GITHUB_OUTPUT"
