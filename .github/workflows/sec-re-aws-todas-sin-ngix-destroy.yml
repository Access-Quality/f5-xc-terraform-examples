name: "Seguridad en RE para Arcadia + DVWA + Boutique + crAPI en AWS sin nginx - Destroy"

on:
  workflow_dispatch:

jobs:
  terraform_xc:
    name: "F5XC WAF"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./todas_sin_nginx/xc
    env:
      TF_VAR_tf_cloud_organization:    ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_tf_cloud_workspace_infra: sec-re-aws-todas-sin-nginx-infra
      TF_VAR_tf_cloud_workspace_vm:    sec-re-aws-todas-sin-nginx-vm
      TF_VAR_api_url:                  ${{ secrets.XC_API_URL }}
      TF_VAR_xc_namespace:             ${{ vars.XC_NAMESPACE }}
      TF_VAR_arcadia_domain:           ${{ vars.ARCADIA_DOMAIN }}
      TF_VAR_dvwa_domain:              ${{ vars.DVWA_DOMAIN }}
      TF_VAR_boutique_domain:          ${{ vars.BOUTIQUE_DOMAIN }}
      TF_VAR_crapi_domain:             ${{ vars.CRAPI_DOMAIN }}
      TF_VAR_mailhog_domain:           ${{ vars['MAILHOG_DOMAIN'] }}
      TF_VAR_xc_waf_blocking:          false
      TF_VAR_xc_bot_defense:           ${{ vars.XC_BOT_DEFENSE }}
      TF_VAR_xc_api_discovery:         ${{ vars.XC_API_DISCOVERY }}
      TF_VAR_xc_api_protection:        ${{ vars.XC_API_PROTECTION }}
      TF_VAR_xc_api_specs:             '[]'
      VES_P12_PASSWORD:                ${{ secrets.XC_P12_PASSWORD }}
      VOLT_API_P12_FILE:               api.p12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "sec-re-aws-todas-sin-nginx-xc"
              }
            }
          }
          EOF
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > api.p12

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

      - name: Delete API specs from F5 XC object store
        run: |
          API_URL="${{ secrets.XC_API_URL }}"
          NAMESPACE="${{ vars.XC_NAMESPACE }}"
          SWAGGERS="arcadia-oas3 crapi-openapi"

          openssl pkcs12 -legacy -in api.p12 -clcerts -nokeys \
            -passin pass:"${{ secrets.XC_P12_PASSWORD }}" -out /tmp/cert.pem 2>/dev/null || \
          openssl pkcs12 -in api.p12 -clcerts -nokeys \
            -passin pass:"${{ secrets.XC_P12_PASSWORD }}" -out /tmp/cert.pem
          openssl pkcs12 -legacy -in api.p12 -nocerts -nodes \
            -passin pass:"${{ secrets.XC_P12_PASSWORD }}" -out /tmp/key.pem 2>/dev/null || \
          openssl pkcs12 -in api.p12 -nocerts -nodes \
            -passin pass:"${{ secrets.XC_P12_PASSWORD }}" -out /tmp/key.pem

          for SWAGGER_NAME in ${SWAGGERS}; do
            HTTP_CODE=$(curl -s -o /tmp/swagger_del.json -w "%{http_code}" \
              --cert /tmp/cert.pem --key /tmp/key.pem \
              -X DELETE \
              "${API_URL}/object_store/namespaces/${NAMESPACE}/stored_objects/swagger/${SWAGGER_NAME}")
            echo "Swagger ${SWAGGER_NAME} response code: ${HTTP_CODE}"
            cat /tmp/swagger_del.json
            if [ "${HTTP_CODE}" = "200" ] || [ "${HTTP_CODE}" = "404" ]; then
              echo "Swagger ${SWAGGER_NAME} removido (${HTTP_CODE})."
            else
              echo "WARNING: No se pudo borrar ${SWAGGER_NAME} (HTTP ${HTTP_CODE}) - borrar manualmente si es necesario."
            fi
          done
          rm -f /tmp/cert.pem /tmp/key.pem

      - name: Delete XC Namespace
        run: |
          XC_API_BASE=$(echo "${{ secrets.XC_API_URL }}" | sed 's|/api$||')
          openssl pkcs12 -legacy -in api.p12 -passin pass:"${{ secrets.XC_P12_PASSWORD }}" -nokeys -clcerts -out /tmp/client.crt 2>/dev/null
          openssl pkcs12 -legacy -in api.p12 -passin pass:"${{ secrets.XC_P12_PASSWORD }}" -nocerts -nodes -out /tmp/client.key 2>/dev/null
          if [ ! -s /tmp/client.crt ] || [ ! -s /tmp/client.key ]; then
            echo "ERROR: Failed to extract cert/key from P12"
            exit 1
          fi
          echo "Waiting 30s for F5 XC control plane to propagate object deletion..."
          sleep 30
          HTTP_CODE=$(curl -s -o /tmp/ns_del_response.json -w "%{http_code}" \
            --cert /tmp/client.crt \
            --key /tmp/client.key \
            -X DELETE \
            "${XC_API_BASE}/api/web/namespaces/${{ vars.XC_NAMESPACE }}")
          rm -f /tmp/client.crt /tmp/client.key
          echo "Response code: ${HTTP_CODE}"
          cat /tmp/ns_del_response.json
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "Namespace deleted successfully."
          elif [ "${HTTP_CODE}" = "404" ]; then
            echo "Namespace already gone (404)."
          elif [ "${HTTP_CODE}" = "403" ]; then
            echo "WARNING: Could not delete namespace (HTTP 403 - insufficient permissions)."
            echo "Delete namespace '${{ vars.XC_NAMESPACE }}' manually in F5 XC Console -> Namespaces."
          else
            echo "ERROR: Failed to delete namespace (HTTP ${HTTP_CODE})"
            exit 1
          fi

  terraform_vm:
    name: "AWS VM sin nginx"
    runs-on: ubuntu-latest
    needs: terraform_xc
    defaults:
      run:
        working-directory: ./todas_sin_nginx/vm
    env:
      AWS_ACCESS_KEY_ID:               ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY:           ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization:    ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_tf_cloud_workspace_infra: sec-re-aws-todas-sin-nginx-infra
      TF_VAR_arcadia_domain:           ${{ vars.ARCADIA_DOMAIN }}
      TF_VAR_dvwa_domain:              ${{ vars.DVWA_DOMAIN }}
      TF_VAR_boutique_domain:          ${{ vars.BOUTIQUE_DOMAIN }}
      TF_VAR_crapi_domain:             ${{ vars.CRAPI_DOMAIN }}
      TF_VAR_mailhog_domain:           ${{ vars['MAILHOG_DOMAIN'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Extract SSH public key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          SSH_PUBLIC_KEY=$(ssh-keygen -y -f /tmp/id_rsa)
          rm -f /tmp/id_rsa
          echo "TF_VAR_ssh_key=${SSH_PUBLIC_KEY}" >> $GITHUB_ENV

      - name: Setup Terraform Backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "sec-re-aws-todas-sin-nginx-vm"
              }
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

  terraform_infra:
    name: "AWS Infra"
    runs-on: ubuntu-latest
    needs: terraform_vm
    defaults:
      run:
        working-directory: ./todas_sin_nginx/infra
    env:
      AWS_ACCESS_KEY_ID:            ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY:        ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_aws_region:            ${{ vars.AWS_REGION }}
      TF_VAR_project_prefix:        ${{ format('{0}-sin-nginx', vars.PROJECT_PREFIX) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "sec-re-aws-todas-sin-nginx-infra"
              }
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false