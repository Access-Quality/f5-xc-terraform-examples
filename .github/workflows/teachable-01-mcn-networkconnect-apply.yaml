name: "Teachable 01-mcn-networkconnect Apply"

on:
  workflow_dispatch:
    inputs:
      lesson:
        description: "Select Lesson to run"
        required: true
        default: "azure-vnet-site"
        type: choice
        options:
          - azure-vnet-site
          - aws-vpc-site
          - global-network
          - enhanced-firewall
      TF_VAR_prefix:
        description: "Prefix"
        required: false
        type: string
  workflow_call:
    inputs:
      lesson:
        description: "Lesson to run"
        required: true
        type: string
      TF_VAR_prefix:
        description: "Prefix"
        required: false
        type: string
    secrets:
      TF_CLOUD_ORGANIZATION:
      TF_API_TOKEN:
      XC_API_URL:
      XC_P12_PASSWORD:
      XC_API_P12_FILE:
      AWS_ACCESS_KEY:
      AWS_SECRET_KEY:
      AWS_SESSION_TOKEN:
      XC_AWS_CLOUD_CREDENTIALS_NAME:
      AZURE_SUBSCRIPTION_ID:
      AZURE_TENANT_ID:
      AZURE_CLIENT_ID:
      AZURE_CLIENT_SECRET:
      XC_AZURE_CLOUD_CREDENTIALS_NAME:

jobs:
  apply_variables:
    name: "Apply Environment Variables"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./teachable/01-mcn-networkconnect"
    env:
      TF_VAR_name: "teachable-mcn"
      TF_CLOUD_WORKSPACE_TEACHABLE_MCN: "teachable-01-mcn"
      TF_CLOUD_WORKSPACE_TEACHABLE_MCN_FW: "teachable-01-mcn-fw"
      TF_CLOUD_WORKSPACE_AWS_CREDENTIALS: "aws-cloud-credentials"
      TF_CLOUD_WORKSPACE_AWS_NETWORKING: "aws-networking"
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE: "aws-vpc-site"
      AWS_CLOUD_CREDENTIALS_TF_VAR_name: "aws-cloud-credentials"
      AWS_NETWORKING_TF_VAR_name: "aws-networking"
      TF_VAR_aws_vpc_site_name: "aws-vpc-site"
      TF_VAR_prefix: ""
      TF_VAR_tags: '{"project": "teachable"}'
      TF_VAR_aws_region: "us-east-1"
      TF_VAR_aws_az_names: '["us-east-1a"]'
      TF_VAR_aws_inside_subnets: '["10.10.11.0/24"]'
      TF_VAR_aws_outside_subnets: '["10.10.31.0/24"]'
      TF_VAR_aws_workload_subnets: '["10.10.21.0/24"]'
      TF_VAR_aws_vpc_cidr: "10.10.0.0/16"
      TF_CLOUD_WORKSPACE_AZURE_NETWORKING: "azure-networking"
      TF_CLOUD_WORKSPACE_AZURE_CREDENTIALS: "azure-cloud-credentials"
      TF_CLOUD_WORKSPACE_AZURE_VNET_SITE: "azure-vnet-site"
      AZURE_CLOUD_CREDENTIALS_TF_VAR_name: "azure-cloud-credentials"
      AZURE_NETWORKING_TF_VAR_name: "azure-networking"
      TF_VAR_azure_vnet_site_name: "azure-vnet-site"
      TF_VAR_azure_location: "centralus"
      TF_VAR_azure_resource_group_name: ""
      TF_VAR_azure_inside_subnets: '["172.10.21.0/24"]'
      TF_VAR_azure_outside_subnets: '["172.10.31.0/24"]'
      TF_VAR_azure_vnet_cidr: "172.10.0.0/16"
      # TODO: update ips
      TF_VAR_aws_vm_private_ip: "10.10.21.100"
      TF_VAR_azure_vm_private_ip: "172.10.21.100"
    outputs:
      TF_CLOUD_WORKSPACE_AWS_CREDENTIALS: ${{ steps.update_output.outputs.TF_CLOUD_WORKSPACE_AWS_CREDENTIALS }}
      TF_CLOUD_WORKSPACE_AWS_NETWORKING: ${{ steps.update_output.outputs.TF_CLOUD_WORKSPACE_AWS_NETWORKING }}
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE: ${{ steps.update_output.outputs.TF_CLOUD_WORKSPACE_AWS_VPC_SITE }}
      TF_CLOUD_WORKSPACE_TEACHABLE_MCN: ${{ steps.update_output.outputs.TF_CLOUD_WORKSPACE_TEACHABLE_MCN }}
      TF_CLOUD_WORKSPACE_TEACHABLE_MCN_FW: ${{ steps.update_output.outputs.TF_CLOUD_WORKSPACE_TEACHABLE_MCN_FW }}
      AWS_CLOUD_CREDENTIALS_TF_VAR_name: ${{ steps.update_output.outputs.AWS_CLOUD_CREDENTIALS_TF_VAR_name }}
      AWS_NETWORKING_TF_VAR_name: ${{ steps.update_output.outputs.AWS_NETWORKING_TF_VAR_name }}
      TF_VAR_name: ${{ steps.update_output.outputs.TF_VAR_name }}
      TF_VAR_aws_vpc_site_name: ${{ steps.update_output.outputs.TF_VAR_aws_vpc_site_name }}
      TF_VAR_prefix: ${{ steps.update_output.outputs.TF_VAR_prefix }}
      TF_VAR_tags: ${{ steps.update_output.outputs.TF_VAR_tags }}
      TF_VAR_aws_region: ${{ steps.update_output.outputs.TF_VAR_aws_region }}
      TF_VAR_aws_az_names: ${{ steps.update_output.outputs.TF_VAR_aws_az_names }}
      TF_VAR_aws_inside_subnets: ${{ steps.update_output.outputs.TF_VAR_aws_inside_subnets }}
      TF_VAR_aws_outside_subnets: ${{ steps.update_output.outputs.TF_VAR_aws_outside_subnets }}
      TF_VAR_aws_workload_subnets: ${{ steps.update_output.outputs.TF_VAR_aws_workload_subnets }}
      TF_VAR_aws_vpc_cidr: ${{ steps.update_output.outputs.TF_VAR_aws_vpc_cidr }}
      TF_CLOUD_WORKSPACE_AZURE_CREDENTIALS: ${{ steps.update_output.outputs.TF_CLOUD_WORKSPACE_AZURE_CREDENTIALS }}
      TF_CLOUD_WORKSPACE_AZURE_NETWORKING: ${{ steps.update_output.outputs.TF_CLOUD_WORKSPACE_AZURE_NETWORKING }}
      TF_CLOUD_WORKSPACE_AZURE_VNET_SITE: ${{ steps.update_output.outputs.TF_CLOUD_WORKSPACE_AZURE_VNET_SITE }}
      AZURE_CLOUD_CREDENTIALS_TF_VAR_name: ${{ steps.update_output.outputs.AZURE_CLOUD_CREDENTIALS_TF_VAR_name }}
      AZURE_NETWORKING_TF_VAR_name: ${{ steps.update_output.outputs.AZURE_NETWORKING_TF_VAR_name }}
      TF_VAR_azure_vnet_site_name: ${{ steps.update_output.outputs.TF_VAR_azure_vnet_site_name }}
      TF_VAR_azure_location: ${{ steps.update_output.outputs.TF_VAR_azure_location }}
      TF_VAR_azure_resource_group_name: ${{ steps.update_output.outputs.TF_VAR_azure_resource_group_name }}
      TF_VAR_azure_inside_subnets: ${{ steps.update_output.outputs.TF_VAR_azure_inside_subnets }}
      TF_VAR_azure_outside_subnets: ${{ steps.update_output.outputs.TF_VAR_azure_outside_subnets }}
      TF_VAR_azure_vnet_cidr: ${{ steps.update_output.outputs.TF_VAR_azure_vnet_cidr }}
      TF_VAR_aws_vm_private_ip: ${{ steps.update_output.outputs.TF_VAR_aws_vm_private_ip }}
      TF_VAR_azure_vm_private_ip: ${{ steps.update_output.outputs.TF_VAR_azure_vm_private_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - id: apply_variables
        uses: "./.github/actions/apply-variables"
        with:
          vars_json: "${{ toJSON(vars) }}"
          vars_prefix: "T01_TF_VAR_"
          inputs_json: "${{ toJSON(inputs) }}"

      - name: update_output
        id: update_output
        shell: bash
        env:
          ALL_ENV: ${{ toJSON(env) }}
        run: |
          echo "$ALL_ENV" |
          jq -r ' 
              to_entries | 
              .[] | 
              select(.key) | 
              select(if .value | type == "string" then .value | length > 0 else .value != null end) | 
              "\(.key)=\(.value)" 
          ' >> "$GITHUB_OUTPUT"

  aws_credentials:
    name: "AWS Credentials"
    if: (inputs.lesson == 'aws-vpc-site' || inputs.lesson == 'global-network' || inputs.lesson == 'enhanced-firewall')
    needs: [apply_variables]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./f5/xc/aws-cloud-credentials"
    env:
      TF_VAR_name: ${{ needs.apply_variables.outputs.AWS_CLOUD_CREDENTIALS_TF_VAR_name }}
      TF_VAR_prefix: ${{ needs.apply_variables.outputs.TF_VAR_prefix }}
      TF_CLOUD_WORKSPACE_AWS_CREDENTIALS: ${{ needs.apply_variables.outputs.TF_CLOUD_WORKSPACE_AWS_CREDENTIALS }}
      VOLT_API_URL: ${{ secrets.XC_API_URL }}
      VOLT_API_P12_FILE: "./api.p12"
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_xc_aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
      TF_VAR_xc_aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_aws_cloud_credentials_name: ${{ secrets.XC_AWS_CLOUD_CREDENTIALS_NAME }}
    outputs:
      aws_credentials_name: ${{ steps.output_vars.outputs.aws_credentials_name }}
      aws_credentials_namespace: ${{ steps.output_vars.outputs.aws_credentials_namespace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > api.p12
          echo VOLT_API_P12_FILE="$PWD/api.p12" >> "$GITHUB_ENV"

          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "$TF_CLOUD_WORKSPACE_AWS_CREDENTIALS"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Normalize AWS VPC Site module
        run: |
          python3 - <<'PY'
            from pathlib import Path
            import textwrap

            path = Path('.terraform/modules/aws_vpc_site/main.tf')
            text = path.read_text()
            old = textwrap.dedent("""\
                  performance_enhancement_mode {
                    perf_mode_l7_enhanced = (null == var.jumbo)

                    dynamic \"perf_mode_l3_enhanced\" {
                      for_each = (null != var.jumbo) ? [0] : []
                      content {
                        jumbo    = (true == var.jumbo) ? true : null
                        no_jumbo = (false == var.jumbo) ? true : null
                      }
                    }
                  }""")
            new = textwrap.dedent("""\
                  dynamic \"performance_enhancement_mode\" {
                    for_each = (null != var.jumbo) ? [0] : []
                    content {
                      dynamic \"perf_mode_l3_enhanced\" {
                        for_each = [0]
                        content {
                          jumbo    = (true == var.jumbo) ? true : null
                          no_jumbo = (false == var.jumbo) ? true : null
                        }
                      }
                    }
                  }""")
            count = text.count(old)
            if count != 2:
                raise SystemExit(f'expected 2 replacements, found {count}')
            path.write_text(text.replace(old, new))
          PY

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Apply
        run: terraform apply -no-color -auto-approve -input=false

      - name: Set output vars
        id: output_vars
        run: |
          sleep 5
          echo "aws_credentials_name=$(terraform-bin output -no-color -raw name)" >> "$GITHUB_OUTPUT"
          echo "aws_credentials_namespace=$(terraform-bin output -no-color -raw namespace)" >> "$GITHUB_OUTPUT"

  aws_networking:
    name: "AWS Networking"
    if: (inputs.lesson == 'aws-vpc-site' || inputs.lesson == 'global-network' || inputs.lesson == 'enhanced-firewall')
    needs: [apply_variables]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./aws/networking"
    env:
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_CLOUD_WORKSPACE_AWS_NETWORKING: ${{ needs.apply_variables.outputs.TF_CLOUD_WORKSPACE_AWS_NETWORKING }}
      TF_VAR_name: ${{ needs.apply_variables.outputs.AWS_NETWORKING_TF_VAR_name }}
      TF_VAR_prefix: ${{ needs.apply_variables.outputs.TF_VAR_prefix }}
      TF_VAR_aws_region: ${{ needs.apply_variables.outputs.TF_VAR_aws_region }}
      TF_VAR_existing_vpc_id: ""
      TF_VAR_create_outside_route_table: "true"
      TF_VAR_create_outside_default_route: "false"
      TF_VAR_create_internet_gateway: "true"
      TF_VAR_create_outside_security_group: "true"
      TF_VAR_create_inside_security_group: "true"
      TF_VAR_create_udp_security_group_rules: "true"
      TF_VAR_tags: ${{ needs.apply_variables.outputs.TF_VAR_tags }}
      TF_VAR_az_names: ${{ needs.apply_variables.outputs.TF_VAR_aws_az_names }}
      TF_VAR_local_subnets: "[]"
      TF_VAR_inside_subnets: ${{ needs.apply_variables.outputs.TF_VAR_aws_inside_subnets }}
      TF_VAR_outside_subnets: ${{ needs.apply_variables.outputs.TF_VAR_aws_outside_subnets }}
      TF_VAR_workload_subnets: ${{ needs.apply_variables.outputs.TF_VAR_aws_workload_subnets }}
      TF_VAR_vpc_cidr: ${{ needs.apply_variables.outputs.TF_VAR_aws_vpc_cidr }}
      TF_VAR_vpc_instance_tenancy: "default"
      TF_VAR_vpc_enable_dns_hostnames: "true"
      TF_VAR_vpc_enable_dns_support: "true"
      TF_VAR_vpc_enable_network_address_usage_metrics: "false"
    outputs:
      vpc_id: ${{ steps.output_vars.outputs.vpc_id }}
      vpc_name: ${{ steps.output_vars.outputs.vpc_name }}
      vpc_cidr: ${{ steps.output_vars.outputs.vpc_cidr }}
      outside_subnet_ids: ${{ steps.output_vars.outputs.outside_subnet_ids }}
      inside_subnet_ids: ${{ steps.output_vars.outputs.inside_subnet_ids }}
      workload_subnet_ids: ${{ steps.output_vars.outputs.workload_subnet_ids }}
      local_subnet_ids: ${{ steps.output_vars.outputs.local_subnet_ids }}
      outside_route_table_id: ${{ steps.output_vars.outputs.outside_route_table_id }}
      internet_gateway_id: ${{ steps.output_vars.outputs.internet_gateway_id }}
      outside_security_group_id: ${{ steps.output_vars.outputs.outside_security_group_id }}
      inside_security_group_id: ${{ steps.output_vars.outputs.inside_security_group_id }}
      default_security_group_id: ${{ steps.output_vars.outputs.default_security_group_id }}
      az_names: ${{ steps.output_vars.outputs.az_names }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "$TF_CLOUD_WORKSPACE_AWS_NETWORKING"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Normalize AWS VPC Site module
        run: |
          python3 - <<'PY'
            from pathlib import Path
            import textwrap

            path = Path('.terraform/modules/aws_vpc_site/main.tf')
            text = path.read_text()
            old = textwrap.dedent("""\
                  performance_enhancement_mode {
                    perf_mode_l7_enhanced = (null == var.jumbo)

                    dynamic \"perf_mode_l3_enhanced\" {
                      for_each = (null != var.jumbo) ? [0] : []
                      content {
                        jumbo    = (true == var.jumbo) ? true : null
                        no_jumbo = (false == var.jumbo) ? true : null
                      }
                    }
                  }""")
            new = textwrap.dedent("""\
                  dynamic \"performance_enhancement_mode\" {
                    for_each = (null != var.jumbo) ? [0] : []
                    content {
                      dynamic \"perf_mode_l3_enhanced\" {
                        for_each = [0]
                        content {
                          jumbo    = (true == var.jumbo) ? true : null
                          no_jumbo = (false == var.jumbo) ? true : null
                        }
                      }
                    }
                  }""")
            count = text.count(old)
            if count != 2:
                raise SystemExit(f'expected 2 replacements, found {count}')
            path.write_text(text.replace(old, new))
          PY

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Apply
        run: terraform apply -no-color -auto-approve -input=false

      - name: Set output vars
        id: output_vars
        run: |
          sleep 5
          echo "vpc_id=$(terraform-bin output -raw -no-color vpc_id)" >> "$GITHUB_OUTPUT"
          echo "vpc_name=$(terraform-bin output -raw -no-color vpc_name)" >> "$GITHUB_OUTPUT"
          echo "vpc_cidr=$(terraform-bin output -raw -no-color vpc_cidr)" >> "$GITHUB_OUTPUT"
          echo "outside_subnet_ids=$(terraform-bin output -json -no-color outside_subnet_ids)" >> "$GITHUB_OUTPUT"
          echo "inside_subnet_ids=$(terraform-bin output -json -no-color inside_subnet_ids)" >> "$GITHUB_OUTPUT"
          echo "workload_subnet_ids=$(terraform-bin output -json -no-color workload_subnet_ids)" >> "$GITHUB_OUTPUT"
          echo "local_subnet_ids=$(terraform-bin output -json -no-color local_subnet_ids)" >> "$GITHUB_OUTPUT"
          echo "outside_route_table_id=$(terraform-bin output -raw -no-color outside_route_table_id)" >> "$GITHUB_OUTPUT"
          echo "internet_gateway_id=$(terraform-bin output -raw -no-color internet_gateway_id)" >> "$GITHUB_OUTPUT"
          echo "outside_security_group_id=$(terraform-bin output -raw -no-color outside_security_group_id)" >> "$GITHUB_OUTPUT"
          echo "inside_security_group_id=$(terraform-bin output -raw -no-color inside_security_group_id)" >> "$GITHUB_OUTPUT"
          echo "default_security_group_id=$(terraform-bin output -raw -no-color default_security_group_id)" >> "$GITHUB_OUTPUT"
          echo "az_names=$(terraform-bin output -json -no-color az_names)" >> "$GITHUB_OUTPUT"

  aws_vpc_site:
    name: "AWS VPC Site"
    if: (inputs.lesson == 'aws-vpc-site' || inputs.lesson == 'global-network' || inputs.lesson == 'enhanced-firewall')
    needs: [apply_variables, aws_credentials, aws_networking]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./f5/xc/aws-vpc-site"
    env:
      VOLT_API_URL: ${{ secrets.XC_API_URL }}
      VOLT_API_P12_FILE: "./api.p12"
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_aws_cloud_credentials_name: ${{ needs.aws_credentials.outputs.aws_credentials_name }}
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE: ${{ needs.apply_variables.outputs.TF_CLOUD_WORKSPACE_AWS_VPC_SITE }}
      TF_VAR_aws_region: ${{ needs.apply_variables.outputs.TF_VAR_aws_region }}
      TF_VAR_name: ${{ needs.apply_variables.outputs.TF_VAR_aws_vpc_site_name }}
      TF_VAR_prefix: ${{ needs.apply_variables.outputs.TF_VAR_prefix }}
      TF_VAR_aws_cloud_credentials_namespace: ""
      TF_VAR_aws_cloud_credentials_tenant: ""
      TF_VAR_site_description: ""
      TF_VAR_site_namespace: ""
      TF_VAR_tags: ${{ needs.apply_variables.outputs.TF_VAR_tags }}
      TF_VAR_offline_survivability_mode: ""
      TF_VAR_software_version: ""
      TF_VAR_operating_system_version: ""
      TF_VAR_site_type: "ingress_egress_gw"
      TF_VAR_master_nodes_az_names: ${{ needs.aws_networking.outputs.az_names }}
      TF_VAR_nodes_disk_size: ""
      TF_VAR_ssh_key: ""
      TF_VAR_instance_type: ""
      TF_VAR_jumbo: ""
      TF_VAR_direct_connect: ""
      TF_VAR_egress_nat_gw: ""
      TF_VAR_egress_virtual_private_gateway: ""
      TF_VAR_enable_internet_vip: ""
      TF_VAR_allowed_vip_port: ""
      TF_VAR_log_receiver: ""
      TF_VAR_vpc_id: ${{ needs.aws_networking.outputs.vpc_id }}
      TF_VAR_vpc_cidr: ""
      TF_VAR_create_aws_vpc: "false"
      TF_VAR_custom_security_group: '{ "outside_security_group_id": "${{ needs.aws_networking.outputs.outside_security_group_id }}", "inside_security_group_id": "${{ needs.aws_networking.outputs.inside_security_group_id }}"}'
      TF_VAR_existing_local_subnets: "[]"
      TF_VAR_existing_inside_subnets: ${{ needs.aws_networking.outputs.inside_subnet_ids }}
      TF_VAR_existing_outside_subnets: ${{ needs.aws_networking.outputs.outside_subnet_ids }}
      TF_VAR_existing_workload_subnets: ${{ needs.aws_networking.outputs.workload_subnet_ids }}
      TF_VAR_local_subnets: "[]"
      TF_VAR_inside_subnets: "[]"
      TF_VAR_outside_subnets: "[]"
      TF_VAR_workload_subnets: "[]"
      TF_VAR_worker_nodes_per_az: ""
      TF_VAR_block_all_services: ""
      TF_VAR_blocked_service: ""
      TF_VAR_apply_action_ignore_on_update: ""
      TF_VAR_dc_cluster_group_inside_vn: ""
      TF_VAR_dc_cluster_group_outside_vn: ""
      TF_VAR_active_forward_proxy_policies_list: "[]"
      TF_VAR_forward_proxy_allow_all: ""
      TF_VAR_global_network_connections_list: "[]"
      TF_VAR_inside_static_route_list: "[]"
      TF_VAR_outside_static_route_list: "[]"
      TF_VAR_enhanced_firewall_policies_list: "[]"
      TF_VAR_active_network_policies_list: "[]"
      TF_VAR_sm_connection_public_ip: ""
      TF_VAR_vpc_instance_tenancy: ""
      TF_VAR_vpc_enable_dns_hostnames: ""
      TF_VAR_vpc_enable_dns_support: ""
      TF_VAR_vpc_enable_network_address_usage_metrics: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > api.p12
          echo VOLT_API_P12_FILE="$PWD/api.p12" >> "$GITHUB_ENV"

          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "$TF_CLOUD_WORKSPACE_AWS_VPC_SITE"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Normalize AWS VPC Site module
        run: |
          python3 - <<'PY'
            from pathlib import Path
            import textwrap

            path = Path('.terraform/modules/aws_vpc_site/main.tf')
            text = path.read_text()
            old = textwrap.dedent("""\
                  performance_enhancement_mode {
                    perf_mode_l7_enhanced = (null == var.jumbo)

                    dynamic \"perf_mode_l3_enhanced\" {
                      for_each = (null != var.jumbo) ? [0] : []
                      content {
                        jumbo    = (true == var.jumbo) ? true : null
                        no_jumbo = (false == var.jumbo) ? true : null
                      }
                    }
                  }""")
            new = textwrap.dedent("""\
                  dynamic \"performance_enhancement_mode\" {
                    for_each = (null != var.jumbo) ? [0] : []
                    content {
                      dynamic \"perf_mode_l3_enhanced\" {
                        for_each = [0]
