  test_connection:
    name: "Test Connection"
    if: (inputs.lesson == 'global-network' || inputs.lesson == 'enhanced-firewall')
    needs: [azure_global_network, aws_global_network, global_network]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./teachable/01-mcn-networkconnect/terraform/global-network"
    env:
      SSH_PRIVATE_KEY_SECRET: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Test Connection
        run: |
          mkdir -p "$PWD/.ssh" && chmod 700 "$PWD/.ssh"
          SSH_KEY_PATH="$PWD/.ssh/test_vm.pem"
          SSH_HOST="${{ needs.global_network.outputs.ssh_host }}"
          SSH_PORT="${{ needs.global_network.outputs.ssh_port }}"

          if [ -n "$SSH_PRIVATE_KEY_SECRET" ]; then
            printf '%s\n' "$SSH_PRIVATE_KEY_SECRET" > "$SSH_KEY_PATH"
            echo "Using SSH_PRIVATE_KEY secret for authentication."
          else
            printf '%s' '${{ needs.global_network.outputs.ssh_private_key }}' | base64 --decode > "$SSH_KEY_PATH"
            echo "Using auto-generated SSH key from Terraform output."
          fi
          chmod 600 "$SSH_KEY_PATH"

          if ! ssh-keygen -y -f "$SSH_KEY_PATH" > /dev/null 2>&1; then
            echo "Invalid SSH private key."
            exit 1
          fi

          echo "Trying to connect to ubuntu@$SSH_HOST on port $SSH_PORT"
          SSH_OPTS=(-o ConnectTimeout=10 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$SSH_PORT" -i "$SSH_KEY_PATH")

          echo "Waiting 60s for XC CE site and VM to initialize before first SSH attempt..."
          sleep 60

          connected="false"
          for attempt in {1..30}; do
            SSH_VERBOSE_OPTS=()
            if [[ "$attempt" -eq 30 ]]; then
              SSH_VERBOSE_OPTS=(-vvv)
              echo "Final SSH attempt with verbose diagnostics enabled..."
            fi

            if ssh "${SSH_VERBOSE_OPTS[@]}" "${SSH_OPTS[@]}" "ubuntu@$SSH_HOST" "echo 'SSH connection successful.' && exit"; then
              connected="true"
              break
            fi
            echo "SSH not ready yet (attempt $attempt/30), retrying in 30s..."
            sleep 30
          done

          if [[ "$connected" != "true" ]]; then
            echo "Unable to establish SSH connection after retries."
            exit 1
          fi

          # SSH connection successful
          echo ""
          echo "##########  Test Ping  ##########"
          echo ""
          echo "ping -c 4 -W 10 -v ${{ needs.global_network.outputs.aws_vm_private_ip }}"
          echo ""
          ssh "${SSH_OPTS[@]}" "ubuntu@$SSH_HOST" "ping -c 4 -W 10 -v ${{ needs.global_network.outputs.aws_vm_private_ip }} && exit" || true

          echo ""
          echo "##########  Test HTTP (with retries)  ##########"
          echo ""
          echo "curl -s -D - http://${{ needs.global_network.outputs.aws_vm_private_ip }}/test"
          echo ""
          http_ok="false"
          for http_attempt in {1..12}; do
            if ssh "${SSH_OPTS[@]}" "ubuntu@$SSH_HOST" "curl -s -D - http://${{ needs.global_network.outputs.aws_vm_private_ip }}/test && exit"; then
              http_ok="true"
              break
            fi
            echo "HTTP not ready yet (attempt $http_attempt/12), retrying in 15s..."
            sleep 15
          done

          if [[ "$http_ok" != "true" ]]; then
            echo "Unable to reach AWS VM via HTTP after retries."
            exit 1
          fi

